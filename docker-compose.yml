version: "3.9"

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: unless-stopped
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "9838:8888"   # Web UI

  birdnetgo:
    image: ghcr.io/tphakala/birdnet-go:latest
    container_name: birdnetgo
    restart: unless-stopped
    depends_on:
      - mediamtx
    volumes:
      - ./birdnet/birdnet-config.json:/config.json
    environment:
      - RTSP_USER=${RTSP_USER}
      - RTSP_PASS=${RTSP_PASS}
    ports:
      - "9839:8080"

  birdcall:
    build: ./birdcall
    container_name: birdcall
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - RTMP_URL=${RTMP_URL}
      - RTSP_USER=${RTSP_USER}
      - RTSP_PASS=${RTSP_PASS}
      - BOT_NAME=${BOT_NAME}
      - BOT_AVATAR_PATH=${BOT_AVATAR_PATH}
    depends_on:
      - mediamtx
